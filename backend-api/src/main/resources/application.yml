spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/treasurehunt}
      database: treasurehunt
  application:
    name: treasure-hunt-api

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:treasure-hunt-super-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000  # 24 hours

logging:
  level:
    com.treasurehunt: DEBUG
    org.springframework.security: INFO