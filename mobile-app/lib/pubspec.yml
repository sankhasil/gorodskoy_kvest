name: treasure_hunt
description: Treasure Hunt & Puzzle Solving App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP & State
  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  # Navigation
  go_router: ^13.0.0
  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  lottie: ^3.0.0
  # Maps / GPS clues
  geolocator: ^11.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # QR
  mobile_scanner: ^4.0.0
  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/